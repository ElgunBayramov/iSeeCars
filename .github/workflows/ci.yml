name: .NET CI + Docker

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore iSeeCars.sln

      - name: Build
        run: dotnet build iSeeCars.sln --no-restore

      - name: Publish
        run: dotnet publish iSeeCars.API/iSeeCars.API.csproj -c Release -o iSeeCars.API/bin/Release/net8.0/publish

      - name: Build Docker
        run: docker build -t iseecars-api ./iSeeCars.API
